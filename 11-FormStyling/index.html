<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Forms Styling</title>
	<script src="./Assets/scripts/jquery-4.0.0.min.js"
		integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
	<link href="./Assets/Css/select2.min.css" rel="stylesheet"/>
	<link rel="stylesheet" href="./Assets/Css/fonts.css">
	<link rel="stylesheet" href="./Assets/Css/all.min.css">
	<link rel="stylesheet" href="./Assets/Css/style.css">
</head>
<body>
	<div class="page-wrapper">
		<!-- create section -->
		<div class="container">
			<div class="form-container create-container">
				<h1>Create an Account</h1>
				<form action="#" method="post">
					<div class="form-inner">
						<div class="form-cols">
							<div class="form-row">
								<label for="firstName">First Name</label>
								<input type="text" id="firstName">
							</div>
							<div class="form-row">
								<label for="lastName">Last Name</label>
								<input type="text" id="lastName">
							</div>
						</div>
						<div class="form-row">
							<label for="email">E-mail</label>
							<input type="email" id="email">
							<p class="email-hint">We'll never share your email with anyone else.</p>
						</div>
						<div class="form-row radio-row">
							<input type="radio" id="male" name="gender" checked>
							<label for="male">Male</label>
							<input type="radio" id="female" name="gender">
							<label for="female">Female</label>
						</div>
						<div class="form-cols">
							<div class="form-row">
								<label for="country">Country</label>
								<select name="country" id="country" class="select2 select2-placeholder-single">
									<option selected disabled hidden></option>
									<option value="ukraine">Ukraine</option>
									<option value="poland">Poland</option>
									<option value="germany">Germany</option>
									<option value="finland">Finland</option>
								</select>
							</div>
							<div class="form-row">
								<label for="city">City</label>
								<input type="text" id="city">
							</div>
						</div>
						<div class="form-row">
							<button type="submit">Sign Up</button>
						</div>
						<div class="form-row confirm-row">
							<p>By clicking the 'Sign Up' button, you confirm that you accept our <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>.</p>
						</div>
					</div>
				</form>
			</div>
			<div class="qst-wrap">
				<span>Have an account?</span>
				<a href="#">Log in</a>
			</div>
		</div>
		<!-- Profile section -->
		<div class="container profile-container">
			<div class="form-container">
				<h2>Profile</h2>
				<form action="#" method="post">
					<div class="ava-container">
						<div class="ava-wrapper">
							<img src="./Assets/Images/Ava.png" alt="ava">
						</div>
						<div class="ava-controls">
							<div class="ava-btn-group">
								<div class="ava-btn-group-inner">
									<input type="file" id="uploadFile" accept="image/*" class="file-upload">
									<div class="fake-file">
										<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
											<path fill-rule="evenodd" clip-rule="evenodd"
												d="M4.78001 3.33333L6.00001 2H10L11.22 3.33333H13.3333C14.0667 3.33333 14.6667 3.93333 14.6667 4.66667V12.6667C14.6667 13.4 14.0667 14 13.3333 14H2.66668C1.93334 14 1.33334 13.4 1.33334 12.6667V4.66667C1.33334 3.93333 1.93334 3.33333 2.66668 3.33333H4.78001ZM4.66668 8.66667C4.66668 10.5067 6.16001 12 8.00001 12C9.84001 12 11.3333 10.5067 11.3333 8.66667C11.3333 6.82667 9.84001 5.33333 8.00001 5.33333C6.16001 5.33333 4.66668 6.82667 4.66668 8.66667ZM8.00001 10.8C9.17822 10.8 10.1333 9.84487 10.1333 8.66667C10.1333 7.48846 9.17822 6.53333 8.00001 6.53333C6.8218 6.53333 5.86668 7.48846 5.86668 8.66667C5.86668 9.84487 6.8218 10.8 8.00001 10.8Z"
												fill="#969696" />
										</svg>
									</div>
									<button type="button">
										<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
										<path fill-rule="evenodd" clip-rule="evenodd"
											d="M4.00001 12.6667C4.00001 13.4 4.60001 14 5.33334 14H10.6667C11.4 14 12 13.4 12 12.6667V4.66667H4.00001V12.6667V12.6667ZM12.6667 2.66667H10.3333L9.66668 2H6.33334L5.66668 2.66667H3.33334V4H12.6667V2.66667V2.66667Z"
											fill="#969696" />
										</svg>
									</button>
								</div>
							</div>
							<p class="upload-hint">
								Up to 1 MB (300x300 px)
							</p>
						</div>
					</div>
					<div class="form-inner">
						<div class="form-row">
							<label for="userName">Name</label>
							<input type="text" id="userName">
						</div>
						<div class="form-row">
							<label for="profileEmail">E-mail</label>
							<input type="email" id="profileEmail">
						</div>
						<div class="form-row">
							<label for="profileCountry">Country</label>
							<select name="profileCountry" id="profileCountry" class="select2">
								<option value="" selected hidden disabled></option>
								<option value="ukraine">Ukraine</option>
								<option value="poland">Poland</option>
								<option value="germany">Germany</option>
								<option value="finland">Finland</option>
							</select>
						</div>
						<div class="form-row">
							<label for="city">City</label>
							<input type="text" id="city">
						</div>
						<div class="form-row">
							<label for="zipCode">Zip-code</label>
							<input type="text" id="zipCode">
						</div>
						<div class="form-row">
							<label for="number">Phone Number</label>
							<input type="tel" id="number">
						</div>
						<button type="submit" class="update-btn">Update</button>
					</div>
				</form>
			</div>
		</div>
	</div>
<script src="./Assets/scripts/select2.min.js"></script>
<script src="./Assets/scripts/script.js"></script>
</body>
</html>
