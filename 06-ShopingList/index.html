<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./Assets/Css/style.css">
	<title>СSS Shoping list</title>
</head>
<body>
	<header>
		<div class="header-container">
			<hgroup>
				<h1>CSS Dinner Shopping List</h1>
				<p>Let’s go to the mall!</p>
			</hgroup>
		</div>
	</header>
	<main>
		<div class="container">
			<form action="#" method="post">
				<ul class="list">
					<li class="list-item">
						<input type="checkbox" name="products[]" id="pickles">
						<label for="pickles">A lot of pickles <span class="item-note">for the next lessons about CSS</span></label>
					</li>
					<li class="list-item">
						<input type="checkbox" name="products[]" id="apples">
						<label for="apples">10 apples<span class="item-note">for more CSS manipulations</span></label>
					</li>
					<li class="list-item">
						<input type="checkbox" name="products[]" id="oranges">
						<label for="oranges">20 oranges<span class="item-note">because they are awesome</span></label>
					</li>
					<li class="list-item">
						<input type="checkbox" name="products[]" id="plates">
						<label for="plates">13 plates<span class="item-note">hm... they always dissapear</span></label>
					</li>
					<li class="list-item">
						<input type="checkbox" name="products[]" id="bentos">
						<label for="bentos">15 bentos</label>
					</li>
					<li class="list-item">
						<input type="checkbox" name="products[]" id="bottle">
						<label for="bottle">1 bottle of Sake<span class="item-note">for my friends</span></label>
					</li>
				</ul>
				<button type="submit">Bon appetit :&rpar;</button>
			</form>
		</div>
	</main>
</body>
</html>
