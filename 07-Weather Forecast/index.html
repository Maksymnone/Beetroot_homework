<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Weather Forecast</title>
	<link rel="stylesheet" href="./Assest/css/weather-icons.min.css">
	<link rel="stylesheet" href="./Assest/css/style.css">
</head>
<body>
	<div class="container">
		<div class="wraper">
			<h1>CSS Weather Forecast <i class="wi wi-sunrise"></i></h1>
			<ul>
				<li class="width50">
					<span class="city">Lisbon</span>
					<span class="temp">21</span>
					<i class="wi wi-day-sunny"></i>
				</li>
				<li class="width25">
					<span class="city">Paris</span>
					<span class="temp">11</span>
					<i class="wi wi-night-sleet"></i>
				</li>
				<li class="width25">
					<span class="city">Belgrade</span>
					<span class="temp">15</span>
					<i class="wi wi-day-cloudy"></i>
				</li>
				<li class="width25">
					<span class="city">Venice</span>
					<span class="temp">21</span>
					<i class="wi wi-day-cloudy-high"></i>
				</li>
				<li class="width25">
					<span class="city">Tel-Avive</span>
					<span class="temp">32</span>
					<i class="wi wi-hot"></i>
				</li>
				<li class="width25">
					<span class="city">Cair</span>
					<span class="temp">21</span>
					<i class="wi wi-day-sunny"></i>
				</li>
				<li class="width25">
					<span class="city">New-York</span>
					<span class="temp">17</span>
					<i class="wi wi-day-sleet-storm"></i>
				</li>
				<li class="width25">
					<span class="city">New-Deli</span>
					<span class="temp">17</span>
					<i class="wi wi-rain-wind"></i>
				</li>
				<li class="width50">
					<span class="city">San-Francisco</span>
					<span class="temp">15</span>
					<i class="wi wi-day-sunny-overcast"></i>
				</li>
				<li class="width25">
					<span class="city">Tokyo</span>
					<span class="temp">8</span>
					<i class="wi wi-night-clear"></i>
				</li>
				<li class="width100">
					<span class="city">Sydney</span>
					<span class="temp">25</span>
					<i class="wi wi-night-partly-cloudy"></i>
				</li>
			</ul>
			<p class="anotation">Have a nice day and don't forget umbrella if you are in New Delhi now!</p>
		</div>
	</div>
</body>
</html>
